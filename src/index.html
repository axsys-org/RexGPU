<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RexGPU</title>
<style>/* __CSS__ */</style>
</head>
<body>
<div id="shell">

  <!-- Full-viewport canvas (layer 0 — behind everything) -->
  <canvas id="gpu-canvas" tabindex="0"></canvas>
  <span id="gpu-overlay"></span>
  <span id="node-count"></span>

  <!-- Top bar (layer 300) -->
  <div id="topbar">
    <div id="tb-left">
      <h1>Rex<span class="h1-dim">GPU</span></h1>
      <span id="gpu-status">initializing&hellip;</span>
    </div>
    <div id="tb-center">
      <div id="tab-bar">
        <div id="tab-add" title="New session">+</div>
      </div>
    </div>
    <div id="tb-right">
      <select id="example-select" title="Load example">
        <option value="">examples</option>
      </select>
      <input id="api-key" type="password" placeholder="sk-ant-&hellip;" autocomplete="off" spellcheck="false">
      <button id="key-show">show</button>
      <div id="key-dot"></div>
    </div>
  </div>

  <!-- Floating panels (layer 10-100) -->
  <div class="fp" id="fp-editor" data-panel="editor">
    <div class="fp-bar">
      <span class="fp-icon">&#9998;</span><span class="fp-label">Source</span>
      <div class="fp-spacer"></div>
      <button class="fp-btn fp-min" title="Minimize">&minus;</button>
      <button class="fp-btn fp-close" title="Close">&times;</button>
    </div>
    <textarea id="rex-src" spellcheck="false"></textarea>
  </div>

  <div class="fp" id="fp-form" data-panel="form">
    <div class="fp-bar">
      <span class="fp-icon">&#9881;</span><span class="fp-label">Properties</span>
      <div class="fp-spacer"></div>
      <button class="fp-btn fp-min" title="Minimize">&minus;</button>
      <button class="fp-btn fp-close" title="Close">&times;</button>
    </div>
    <div id="form-mount"></div>
  </div>

  <div class="fp" id="fp-log" data-panel="log">
    <div class="fp-bar">
      <span class="fp-icon">&#9656;</span><span class="fp-label">Log</span>
      <div class="fp-spacer"></div>
      <button class="fp-btn fp-min" title="Minimize">&minus;</button>
      <button class="fp-btn fp-close" title="Close">&times;</button>
    </div>
    <div id="log-view"></div>
  </div>

  <div class="fp" id="fp-heap" data-panel="heap">
    <div class="fp-bar">
      <span class="fp-icon">&#9638;</span><span class="fp-label">Heap</span>
      <div class="fp-spacer"></div>
      <button class="fp-btn fp-min" title="Minimize">&minus;</button>
      <button class="fp-btn fp-close" title="Close">&times;</button>
    </div>
    <div id="heap-view"></div>
  </div>

  <!-- Command bar (layer 200 — bottom center) -->
  <div id="cmdbar">
    <div id="cmdbar-inner">
      <div id="messages">
        <div class="msg msg-sys">Describe what to render. Claude writes Rex notation. RPE compiles it to GPU.</div>
      </div>
      <div class="chips">
        <span class="chip" data-p="Animated plasma wave shader with 2D panel overlay showing time and speed as a live HUD">plasma + HUD</span>
        <span class="chip" data-p="Raymarched 3D scene with orbiting sphere, drag to orbit, and 2D control panel overlay">3D + controls</span>
        <span class="chip" data-p="Pure 2D dashboard: panels, sliders, animated progress bars, color swatches — no shader needed">2D dashboard</span>
        <span class="chip" data-p="Voronoi noise field with speed and color controls and a live stats overlay">voronoi</span>
        <span class="chip" data-p="Mandelbrot fractal with zoom and color palette sliders">mandelbrot</span>
        <span class="chip" data-p="WASD FPS camera with textured floor and a 2D crosshair and speed readout overlay">fps + HUD</span>
      </div>
      <div id="chat-input">
        <textarea id="prompt" placeholder="Describe what to render&hellip;" rows="1"></textarea>
        <button id="send">Send</button>
      </div>
    </div>
  </div>

  <!-- Panel dock (minimized panels show here) -->
  <div id="panel-dock"></div>

</div>
<script>/* __EXAMPLES__ */</script>
<script>/* __JS__ */</script>
</body>
</html>
